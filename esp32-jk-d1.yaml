esphome:
  name: esp32-jk-d1
  friendly_name: D1电池采集ESP32
  on_boot:
    priority: 600
    then:
      - lambda: |-
          for (int i = 0; i < 5; i++) {
            bool state = id(relay_storage).get_bool(String(i).c_str(), false);
            if (i == 0) id(relay1).publish_state(state);
            if (i == 1) id(relay2).publish_state(state);
            if (i == 2) id(relay3).publish_state(state);
            if (i == 3) id(relay4).publish_state(state);
            if (i == 4) id(relay9).publish_state(state);
          }

substitutions:
  device_name: esp32_jk_d1
  friendly_name: D1电池采集ESP32
  relay1_pin: GPIO1
  relay2_pin: GPIO2
  relay3_pin: GPIO3
  relay4_pin: GPIO4
  relay9_pin: GPIO10
  key_pin: GPIO8
  rain_ao_pin: GPIO0
  gy302_sda: GPIO32
  gy302_scl: GPIO25

external_components:
  - source: github://syssi/esphome-jk-bms@main
    components: [jk_bms_ble]

esp32:
  board: esp32dev
  framework:
    type: arduino

# I2C总线（BH1750强制依赖，已补齐）
i2c:
  sda: ${gy302_sda}
  scl: ${gy302_scl}
  scan: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

logger:
  level: INFO

api:

ota:
  platform: esphome
  password: !secret ota_password

# MQTT 唯一区块，无重复、无非法availability参数
mqtt:
  broker: 10.10.8.197
  port: 1883
  username: mqtt1
  password: mqtt1
  client_id: ${device_name}
  id: mqtt_client
  birth_message:
    topic: esp32/4ch_relay/${device_name}/availability
    payload: online
    qos: 1
    retain: true
  will_message:
    topic: esp32/4ch_relay/${device_name}/availability
    payload: offline
    qos: 1
    retain: true
  on_connect:
    then:
      - logger.log: "MQTT连接成功"
  on_message:
    - topic: esp32/4ch_relay/${device_name}/relay1/set
      payload: "ON"
      then: [switch.turn_on: relay1]
    - topic: esp32/4ch_relay/${device_name}/relay1/set
      payload: "OFF"
      then: [switch.turn_off: relay1]
    - topic: esp32/4ch_relay/${device_name}/relay2/set
      payload: "ON"
      then: [switch.turn_on: relay2]
    - topic: esp32/4ch_relay/${device_name}/relay2/set
      payload: "OFF"
      then: [switch.turn_off: relay2]
    - topic: esp32/4ch_relay/${device_name}/relay3/set
      payload: "ON"
      then: [switch.turn_on: relay3]
    - topic: esp32/4ch_relay/${device_name}/relay3/set
      payload: "OFF"
      then: [switch.turn_off: relay3]
    - topic: esp32/4ch_relay/${device_name}/relay4/set
      payload: "ON"
      then: [switch.turn_on: relay4]
    - topic: esp32/4ch_relay/${device_name}/relay4/set
      payload: "OFF"
      then: [switch.turn_off: relay4]
    - topic: esp32/4ch_relay/${device_name}/relay9/set
      payload: "ON"
      then: [switch.turn_on: relay9]
    - topic: esp32/4ch_relay/${device_name}/relay9/set
      payload: "OFF"
      then: [switch.turn_off: relay9]

esp32_ble_tracker:

ble_client:
  mac_address: "98:DA:20:0D:37:D0"
  id: ble_d1

jk_bms_ble:
  ble_client_id: ble_d1
  id: bms_d1
  protocol_version: JK02_32S
  throttle: 10s

globals:
  - id: relay_storage
    type: Preferences
    restore_value: no
    initial_value: 'Preferences()'

switch:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms_d1
    charging:
      name: "D1_SW1 充电开关"
    discharging:
      name: "D1_SW2 放电开关"
    balancer:
      name: "D1_SW3 均衡开关"

  # 5路GPIO继电器：全部替换为合法 on_state
  - platform: gpio
    id: relay1
    name: "${friendly_name} Relay1"
    pin:
      number: ${relay1_pin}
      inverted: true
    on_state:
      then:
        - lambda: |-
            id(relay_storage).begin("relay", false);
            id(relay_storage).put_bool("0", x);
            id(relay_storage).end();
            id(mqtt_client).publish("esp32/4ch_relay/${device_name}/relay1/state", x ? "ON" : "OFF", true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay2
    name: "${friendly_name} Relay2"
    pin:
      number: ${relay2_pin}
      inverted: true
    on_state:
      then:
        - lambda: |-
            id(relay_storage).begin("relay", false);
            id(relay_storage).put_bool("1", x);
            id(relay_storage).end();
            id(mqtt_client).publish("esp32/4ch_relay/${device_name}/relay2/state", x ? "ON" : "OFF", true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay3
    name: "${friendly_name} Relay3"
    pin:
      number: ${relay3_pin}
      inverted: true
    on_state:
      then:
        - lambda: |-
            id(relay_storage).begin("relay", false);
            id(relay_storage).put_bool("2", x);
            id(relay_storage).end();
            id(mqtt_client).publish("esp32/4ch_relay/${device_name}/relay3/state", x ? "ON" : "OFF", true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay4
    name: "${friendly_name} Relay4"
    pin:
      number: ${relay4_pin}
      inverted: true
    on_state:
      then:
        - lambda: |-
            id(relay_storage).begin("relay", false);
            id(relay_storage).put_bool("3", x);
            id(relay_storage).end();
            id(mqtt_client).publish("esp32/4ch_relay/${device_name}/relay4/state", x ? "ON" : "OFF", true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay9
    name: "${friendly_name} Relay9"
    pin:
      number: ${relay9_pin}
      inverted: false
    on_state:
      then:
        - lambda: |-
            id(relay_storage).begin("relay", false);
            id(relay_storage).put_bool("4", x);
            id(relay_storage).end();
            id(mqtt_client).publish("esp32/4ch_relay/${device_name}/relay9/state", x ? "ON" : "OFF", true);
    icon: mdi:power-socket-us

sensor:
  # JK-BMS 17串完整采集，无语法问题
  - platform: jk_bms_ble
    jk_bms_ble_id: bms_d1
    total_voltage:
      name: "D1_S01 总电压"
    current:
      name: "D1_S02 充放电电流"
    power:
      name: "D1_S03 实时功率"
    state_of_charge:
      name: "D1_S04 SOC电量"
    capacity_remaining:
      name: "D1_S05 剩余容量"
    total_charging_cycle_capacity:
      name: "D1_S06 总循环容量AH"
    average_cell_voltage:
      name: "D1_S07 平均单串电压"
    min_cell_voltage:
      name: "D1_S08 单串最低电压"
    max_cell_voltage:
      name: "D1_S09 单串最高电压"
    delta_cell_voltage:
      name: "D1_S10 电芯压差"
    cell_voltage_1:
      name: "D1_CELL01 第1串电压"
    cell_voltage_2:
      name: "D1_CELL02 第2串电压"
    cell_voltage_3:
      name: "D1_CELL03 第3串电压"
    cell_voltage_4:
      name: "D1_CELL04 第4串电压"
    cell_voltage_5:
      name: "D1_CELL05 第5串电压"
    cell_voltage_6:
      name: "D1_CELL06 第6串电压"
    cell_voltage_7:
      name: "D1_CELL07 第7串电压"
    cell_voltage_8:
      name: "D1_CELL08 第8串电压"
    cell_voltage_9:
      name: "D1_CELL09 第9串电压"
    cell_voltage_10:
      name: "D1_CELL10 第10串电压"
    cell_voltage_11:
      name: "D1_CELL11 第11串电压"
    cell_voltage_12:
      name: "D1_CELL12 第12串电压"
    cell_voltage_13:
      name: "D1_CELL13 第13串电压"
    cell_voltage_14:
      name: "D1_CELL14 第14串电压"
    cell_voltage_15:
      name: "D1_CELL15 第15串电压"
    cell_voltage_16:
      name: "D1_CELL16 第16串电压"
    cell_voltage_17:
      name: "D1_CELL17 第17串电压"
    mosfet_temperature:
      name: "D1_S11 MOS管温度"
    temperature_sensor_1:
      name: "D1_S12 温度探头1"
    temperature_sensor_2:
      name: "D1_S13 温度探头2"

  # GY302 BH1750：已修正关键字 on_value，删除非法 on_value_update
  - platform: bh1750
    id: gy302_sensor
    name: "${friendly_name} 光照强度"
    address: 0x23
    update_interval: 2s
    unit_of_measurement: lx
    device_class: illuminance
    state_class: measurement
    icon: mdi:sun-wireless-outline
    on_value:
      then:
        - lambda: |-
            char buf[16];
            dtostrf(x, 4, 1, buf);
            id(mqtt_client).publish("esp32/4ch_relay/${device_name}/light/lux", buf, true);

  # 雨水ADC：adc组件支持on_value_update，保留原样，功能完整
  - platform: adc
    id: rain_sensor
    name: "${friendly_name} 雨水湿度"
    pin: ${rain_ao_pin}
    update_interval: 2s
    attenuation: 11db
    raw: true
    icon: mdi:water
    on_value_update:
      then:
        - lambda: |-
            char buf[16];
            itoa(x, buf, 10);
            id(mqtt_client).publish("esp32/4ch_relay/${device_name}/rain/value", buf, true);
            id(rain_raining).publish_state(x < 3000);

text_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms_d1
    total_runtime_formatted:
      name: "D1_T01 累计运行时长"
    errors:
      name: "D1_T02 BMS故障日志"

  - platform: template
    id: esp32_log
    name: "${friendly_name} 系统日志"
    icon: mdi:console-line

binary_sensor:
  # 按键单击双击逻辑，无语法错误
  - platform: gpio
    id: key_button
    pin:
      number: ${key_pin}
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - debounce: 20ms
    on_multi_click:
      - timing:
          - ON for <500ms
          - OFF for >500ms
        then:
          - switch.toggle: relay1
          - lambda: |-
              bool state = id(relay1).state;
              String log_str = "【单击】触发 RELAY1: " + String(state ? "ON" : "OFF");
              id(esp32_log).publish_state(log_str);
              id(mqtt_client).publish("esp32/4ch_relay/${device_name}/log", log_str.c_str(), true);
      - timing:
          - ON for <500ms
          - OFF for <500ms
          - ON for <500ms
          - OFF for >500ms
        then:
          - switch.toggle: relay9
          - lambda: |-
              bool state = id(relay9).state;
              String log_str = "【双击】触发 RELAY9: " + String(state ? "ON" : "OFF");
              id(esp32_log).publish_state(log_str);
              id(mqtt_client).publish("esp32/4ch_relay/${device_name}/log", log_str.c_str(), true);

  # 下雨判断模板传感器
  - platform: template
    id: rain_raining
    name: "${friendly_name} 是否下雨"
    icon: mdi:umbrella
    device_class: moisture
