esphome:
  name: modbus-full-scanner
  on_boot:
    - delay: 2s
    - lambda: |-
        auto &mbus = id(modbus_bus);
        ESP_LOGI("SCAN", "===== 扫描Modbus从站 1~100 开始 =====");
        // 循环1~100，覆盖81
        for(uint8_t slave_id = 1; slave_id <= 100; slave_id++){
          ESP_LOGI("SCAN", "正在探测 ID:%d", slave_id);
          // 标准读保持寄存器回调写法
          mbus.read_holding_registers(
            slave_id,
            0,
            1,
            // 读取成功回调：设备在线
            [slave_id](ModbusRegisterResponse resp){
              ESP_LOGW("SCAN", "✅ 在线从站 ID = %d", slave_id);
            },
            // 读取失败回调
            [slave_id](ModbusErrorType err){
              if(err != MODBUS_ERROR_TIMEOUT){
                ESP_LOGD("SCAN", "ID:%d 设备存在，寄存器地址不匹配", slave_id);
              }
            }
          );
          delay(300);
        }
        ESP_LOGI("SCAN", "===== 1~100扫描完成 =====");

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

logger:
  level: DEBUG

api:
ota:
  platform: esphome

uart:
  id: rs485_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

modbus:
  id: modbus_bus
  uart_id: rs485_uart
  flow_control_pin: GPIO4
  send_wait_time: 200ms
