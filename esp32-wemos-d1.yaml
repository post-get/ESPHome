esphome:
  name: esp32-jk-d1
  friendly_name: D1电池采集ESP32
  on_boot:
    priority: 600
    then:
      - logger.log: "设备启动完成"

substitutions:
  device_id: esp32_4ch_relay_3
  mqtt_prefix: esp32/4ch_relay
  r1_pin: GPIO1
  r2_pin: GPIO2
  r3_pin: GPIO3
  r4_pin: GPIO4
  r9_pin: GPIO16
  key_pin: GPIO27
  rain_pin: GPIO34
  i2c_sda: GPIO21
  i2c_scl: GPIO22

external_components:
  - source: github://syssi/esphome-jk-bms@main
    components: [jk_bms_ble]

esp32:
  board: esp32dev
  framework:
    type: arduino
    advanced:
      sram1_as_iram: true

# 无光照传感器时注释，防止上电总线卡死
#i2c:
#  sda: ${i2c_sda}
#  scl: ${i2c_scl}
#  scan: true
#  timeout: 2ms

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: INFO

api:
ota:
  password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_password
  client_id: ${device_id}
  id: mqtt_client
  birth_message:
    topic: ${mqtt_prefix}/${device_id}/availability
    payload: online
    qos: 1
    retain: true
  will_message:
    topic: ${mqtt_prefix}/${device_id}/availability
    payload: offline
    qos: 1
    retain: true
  on_connect:
    then:
      - logger.log: "MQTT连接成功"
  on_message:
    - topic: ${mqtt_prefix}/${device_id}/relay1/set
      payload: "ON"
      then: [switch.turn_on: relay1]
    - topic: ${mqtt_prefix}/${device_id}/relay1/set
      payload: "OFF"
      then: [switch.turn_off: relay1]
    - topic: ${mqtt_prefix}/${device_id}/relay2/set
      payload: "ON"
      then: [switch.turn_on: relay2]
    - topic: ${mqtt_prefix}/${device_id}/relay2/set
      payload: "OFF"
      then: [switch.turn_off: relay2]
    - topic: ${mqtt_prefix}/${device_id}/relay3/set
      payload: "ON"
      then: [switch.turn_on: relay3]
    - topic: ${mqtt_prefix}/${device_id}/relay3/set
      payload: "OFF"
      then: [switch.turn_off: relay3]
    - topic: ${mqtt_prefix}/${device_id}/relay4/set
      payload: "ON"
      then: [switch.turn_on: relay4]
    - topic: ${mqtt_prefix}/${device_id}/relay4/set
      payload: "OFF"
      then: [switch.turn_off: relay4]
    - topic: ${mqtt_prefix}/${device_id}/relay9/set
      payload: "ON"
      then: [switch.turn_on: relay9]
    - topic: ${mqtt_prefix}/${device_id}/relay9/set
      payload: "OFF"
      then: [switch.turn_off: relay9]

esp32_ble_tracker:
ble_client:
  mac_address: "98:DA:20:0D:37:D0"
  id: ble_d1
jk_bms_ble:
  ble_client_id: ble_d1
  id: bms_d1
  protocol_version: JK02_32S
  throttle: 10s

switch:
  - platform: jk_bms_ble
    charging:
      name: D1_SW1 充电开关
    discharging:
      name: D1_SW2 放电开关
    balancer:
      name: D1_SW3 均衡开关

  - platform: gpio
    id: relay1
    name: "${friendly_name} Relay1"
    pin: ${r1_pin}
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay1).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay1/state",buf,true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay2
    name: "${friendly_name} Relay2"
    pin: ${r2_pin}
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay2).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay2/state",buf,true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay3
    name: "${friendly_name} Relay3"
    pin: ${r3_pin}
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay3).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay3/state",buf,true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay4
    name: "${friendly_name} Relay4"
    pin: ${r4_pin}
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay4).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay4/state",buf,true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay9
    name: "${friendly_name} Relay9"
    pin: ${r9_pin}
    inverted: false
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay9).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay9/state",buf,true);
    icon: mdi:power-socket-us

sensor:
  - platform: jk_bms_ble
    total_voltage:
      name: D1_S01 总电压
    current:
      name: D1_S02 充放电电流
    power:
      name: D1_S03 实时功率
    state_of_charge:
      name: D1_S04 SOC电量
    capacity_remaining:
      name: D1_S05 剩余容量
    total_charging_cycle_capacity:
      name: D1_S06 总循环容量AH
    average_cell_voltage:
      name: D1_S07 平均单串电压
    min_cell_voltage:
      name: D1_S08 单串最低电压
    max_cell_voltage:
      name: D1_S09 单串最高电压
    delta_cell_voltage:
      name: D1_S10 电芯压差
    cell_voltage_1:
      name: D1_CELL01 第1串电压
    cell_voltage_2:
      name: D1_CELL02 第2串电压
    cell_voltage_3:
      name: D1_CELL03 第3串电压
    cell_voltage_4:
      name: D1_CELL04 第4串电压
    cell_voltage_5:
      name: D1_CELL05 第5串电压
    cell_voltage_6:
      name: D1_CELL06 第6串电压
    cell_voltage_7:
      name: D1_CELL07 第7串电压
    cell_voltage_8:
      name: D1_CELL08 第8串电压
    cell_voltage_9:
      name: D1_CELL09 第9串电压
    cell_voltage_10:
      name: D1_CELL10 第10串电压
    cell_voltage_11:
      name: D1_CELL11 第11串电压
    cell_voltage_12:
      name: D1_CELL12 第12串电压
    cell_voltage_13:
      name: D1_CELL13 第13串电压
    cell_voltage_14:
      name: D1_CELL14 第14串电压
    cell_voltage_15:
      name: D1_CELL15 第15串电压
    cell_voltage_16:
      name: D1_CELL16 第16串电压
    cell_voltage_17:
      name: D1_CELL17 第17串电压
    mosfet_temperature:
      name: D1_S11 MOS管温度
    temperature_sensor_1:
      name: D1_S12 温度探头1
    temperature_sensor_2:
      name: D1_S13 温度探头2

  - platform: adc
    id: rain_sensor
    name: "${friendly_name} 雨水湿度1"
    pin: ${rain_pin}
    update_interval: 2s
    attenuation: 12db
    raw: true
    icon: mdi:water
    on_value:
      then:
        - lambda: |-
            char buf[10];
            itoa((int)x,buf,10);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/rain/value",buf,true);
            id(rain_flag).publish_state(x < 3000);

text_sensor:
  - platform: jk_bms_ble
    total_runtime_formatted:
      name: D1_T01 累计运行时长
    errors:
      name: D1_T02 BMS故障日志
  - platform: template
    id: system_log
    name: "${friendly_name} 系统日志"
    icon: mdi:console-line

binary_sensor:
  - platform: gpio
    id: key_button
    pin:
      number: ${key_pin}
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 20ms
    on_multi_click:
      - timing:
          - ON for at most 500ms
          - OFF for at least 500ms
        then:
          - switch.toggle: relay1
      - timing:
          - ON for at most 500ms
          - OFF for at most 500ms
          - ON for at most 500ms
          - OFF for at least 500ms
        then:
          - switch.toggle: relay9

  - platform: template
    id: rain_flag
    name: "${friendly_name} 是否下雨"
    icon: mdi:umbrella
    device_class: moisture
