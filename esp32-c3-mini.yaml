esphome:
  name: esp32-c3-mini
  friendly_name: C3电池采集ESP32
  on_boot:
    priority: 600
    then:
      - logger.log: "C3设备启动完成"

substitutions:
  device_id: esp32_4ch_relay_3
  mqtt_prefix: esp32/4ch_relay
  r1_pin: GPIO1
  r2_pin: GPIO2
  r3_pin: GPIO3
  r4_pin: GPIO4
  r9_pin: GPIO10
  key_pin: GPIO8
  rain_pin: GPIO0
  i2c_sda: GPIO8
  i2c_scl: GPIO9

external_components:
  - source: github://syssi/esphome-jk-bms@main
    components: [jk_bms_ble]

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# 无光照传感器注释，避免启动卡死
#i2c:
#  sda: ${i2c_sda}
#  scl: ${i2c_scl}
#  scan: true
#  timeout: 2ms

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: INFO
api:
ota:
  password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_password
  client_id: ${device_id}
  id: mqtt_client
  birth_message:
    topic: ${mqtt_prefix}/${device_id}/availability
    payload: online
    qos: 1
    retain: true
  will_message:
    topic: ${mqtt_prefix}/${device_id}/availability
    payload: offline
    qos: 1
    retain: true
  on_connect:
    then:
      - logger.log: "C3 MQTT连接成功"
  on_message:
    - topic: ${mqtt_prefix}/${device_id}/relay1/set
      payload: "ON"
      then: [switch.turn_on: relay1]
    - topic: ${mqtt_prefix}/${device_id}/relay1/set
      payload: "OFF"
      then: [switch.turn_off: relay1]
    - topic: ${mqtt_prefix}/${device_id}/relay2/set
      payload: "ON"
      then: [switch.turn_on: relay2]
    - topic: ${mqtt_prefix}/${device_id}/relay2/set
      payload: "OFF"
      then: [switch.turn_off: relay2]
    - topic: ${mqtt_prefix}/${device_id}/relay3/set
      payload: "ON"
      then: [switch.turn_on: relay3]
    - topic: ${mqtt_prefix}/${device_id}/relay3/set
      payload: "OFF"
      then: [switch.turn_off: relay3]
    - topic: ${mqtt_prefix}/${device_id}/relay4/set
      payload: "ON"
      then: [switch.turn_on: relay4]
    - topic: ${mqtt_prefix}/${device_id}/relay4/set
      payload: "OFF"
      then: [switch.turn_off: relay4]
    - topic: ${mqtt_prefix}/${device_id}/relay9/set
      payload: "ON"
      then: [switch.turn_on: relay9]
    - topic: ${mqtt_prefix}/${device_id}/relay9/set
      payload: "OFF"
      then: [switch.turn_off: relay9]

esp32_ble_tracker:
ble_client:
  mac_address: "98:DA:20:0D:37:D0"
  id: ble_d1
jk_bms_ble:
  ble_client_id: ble_d1
  id: bms_d1
  protocol_version: JK02_32S
  throttle: 10s

switch:
  - platform: jk_bms_ble
    charging:
      name: C3_SW1 充电开关
    discharging:
      name: C3_SW2 放电开关
    balancer:
      name: C3_SW3 均衡开关

  - platform: gpio
    id: relay1
    name: "${friendly_name} Relay1"
    pin: ${r1_pin}
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay1).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay1/state",buf,true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay2
    name: "${friendly_name} Relay2"
    pin: ${r2_pin}
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay2).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay2/state",buf,true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay3
    name: "${friendly_name} Relay3"
    pin: ${r3_pin}
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay3).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay3/state",buf,true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay4
    name: "${friendly_name} Relay4"
    pin: ${r4_pin}
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay4).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay4/state",buf,true);
    icon: mdi:power-socket-us

  - platform: gpio
    id: relay9
    name: "${friendly_name} Relay9"
    pin: ${r9_pin}
    inverted: false
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      then:
        - lambda: |-
            char buf[8];
            dtostrf(id(relay9).state,1,0,buf);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/relay9/state",buf,true);
    icon: mdi:power-socket-us

sensor:
  - platform: jk_bms_ble
    total_voltage:
      name: C3_S01 总电压
    current:
      name: C3_S02 充放电电流
    power:
      name: C3_S03 实时功率
    state_of_charge:
      name: C3_S04 SOC电量
    capacity_remaining:
      name: C3_S05 剩余容量
    total_charging_cycle_capacity:
      name: C3_S06 总循环容量AH
    average_cell_voltage:
      name: C3_S07 平均单串电压
    min_cell_voltage:
      name: C3_S08 单串最低电压
    max_cell_voltage:
      name: C3_S09 单串最高电压
    delta_cell_voltage:
      name: C3_S10 电芯压差
    cell_voltage_1:
      name: C3_CELL01 第1串电压
    cell_voltage_2:
      name: C3_CELL02 第2串电压
    cell_voltage_3:
      name: C3_CELL03 第3串电压
    cell_voltage_4:
      name: C3_CELL04 第4串电压
    cell_voltage_5:
      name: C3_CELL05 第5串电压
    cell_voltage_6:
      name: C3_CELL06 第6串电压
    cell_voltage_7:
      name: C3_CELL07 第7串电压
    cell_voltage_8:
      name: C3_CELL08 第8串电压
    cell_voltage_9:
      name: C3_CELL09 第9串电压
    cell_voltage_10:
      name: C3_CELL10 第10串电压
    cell_voltage_11:
      name: C3_CELL11 第11串电压
    cell_voltage_12:
      name: C3_CELL12 第12串电压
    cell_voltage_13:
      name: C3_CELL13 第13串电压
    cell_voltage_14:
      name: C3_CELL14 第14串电压
    cell_voltage_15:
      name: C3_CELL15 第15串电压
    cell_voltage_16:
      name: C3_CELL16 第16串电压
    cell_voltage_17:
      name: C3_CELL17 第17串电压
    mosfet_temperature:
      name: C3_S11 MOS管温度
    temperature_sensor_1:
      name: C3_S12 温度探头1
    temperature_sensor_2:
      name: C3_S13 温度探头2

  - platform: adc
    id: rain_sensor
    name: "${friendly_name} 雨水湿度1"
    pin: ${rain_pin}
    update_interval: 2s
    attenuation: 12db
    raw: true
    icon: mdi:water
    on_value:
      then:
        - lambda: |-
            char buf[10];
            itoa((int)x,buf,10);
            id(mqtt_client).publish("${mqtt_prefix}/${device_id}/rain/value",buf,true);
            id(rain_flag).publish_state(x < 3000);

text_sensor:
  - platform: jk_bms_ble
    total_runtime_formatted:
      name: C3_T01 累计运行时长
    errors:
      name: C3_T02 BMS故障日志
  - platform: template
    id: system_log
    name: "${friendly_name} 系统日志"
    icon: mdi:console-line

binary_sensor:
  - platform: gpio
    id: key_button
    pin:
      number: ${key_pin}
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 20ms
    on_multi_click:
      - timing:
          - ON for at most 500ms
          - OFF for at least 500ms
        then:
          - switch.toggle: relay1
      - timing:
          - ON for at most 500ms
          - OFF for at most 500ms
          - ON for at most 500ms
          - OFF for at least 500ms
        then:
          - switch.toggle: relay9

  - platform: template
    id: rain_flag
    name: "${friendly_name} 是否下雨"
    icon: mdi:umbrella
    device_class: moisture
