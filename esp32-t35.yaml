esphome:
  name: esp32-t35
  friendly_name: ESP32 T35蓝牙桥接

esp32:
  board: esp32dev
  # 显式指定IDF框架，消除提示，同时适配新版OTA语法
  framework:
    type: esp-idf

wifi:
  ssid: !secret WIFI_SSID
  password: !secret WIFI_PASSWORD

# ESP-IDF 框架必须写 platform: esp32_idf
ota:
  platform: esp32_idf
  password: !secret OTA_PASSWORD

# 原生HA直连，无加密，不再需要API_KEY密钥
api:

# 蓝牙代理扫描T35广播
bluetooth_proxy:
  active: true

# 乐易仕T35温湿度电量解析
sensor:
  - platform: xiaomi_ble
    mac_address: BC:A8:44:24:06:D7
    bindkey: !secret T35_KEY
    temperature:
      name: "T35 温度"
      state_class: measurement
      unit_of_measurement: "°C"
    humidity:
      name: "T35 湿度"
      state_class: measurement
      unit_of_measurement: "%"
    battery_level:
      name: "T35 设备电量"
      unit_of_measurement: "%"
