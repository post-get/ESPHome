esphome:
  name: esp32-t35
  friendly_name: ESP32 T35蓝牙桥接

esp32:
  board: esp32dev
  # 强制使用Arduino框架，修复OTA平台找不到的报错
  framework:
    type: arduino

# WiFi联网
wifi:
  ssid: !secret WIFI_SSID
  password: !secret WIFI_PASSWORD

# OTA 标准写法（Arduino框架下直接写，不需要platform字段）
ota:
  password: !secret OTA_PASSWORD

# 原生HA直连，无加密，不需要API_KEY
api:

# 蓝牙代理扫描T35广播
bluetooth_proxy:
  active: true

# T35温湿度、电量解析
sensor:
  - platform: xiaomi_ble
    mac_address: BC:A8:44:24:06:D7
    bindkey: !secret T35_KEY
    temperature:
      name: "T35 温度"
      state_class: measurement
      unit_of_measurement: "°C"
    humidity:
      name: "T35 湿度"
      state_class: measurement
      unit_of_measurement: "%"
    battery_level:
      name: "T35 设备电量"
      unit_of_measurement: "%"
