esphome:
  name: esp32-t35
  friendly_name: ESP32 T35蓝牙桥接

esp32:
  board: esp32dev
  # 强制锁定Arduino框架，彻底规避IDF OTA组件缺失问题
  framework:
    type: arduino

# WiFi 联网，密钥与CI生成文件完全匹配
wifi:
  ssid: !secret WIFI_SSID
  password: !secret WIFI_PASSWORD

# Arduino框架下OTA无需填写platform，不会触发 requires platform 报错
ota:
  password: !secret OTA_PASSWORD

# HA原生直连，移除加密，不再需要API_KEY密钥
api:

# 蓝牙代理持续扫描T35广播
bluetooth_proxy:
  active: true

# 乐易仕T35传感器解析
sensor:
  - platform: xiaomi_ble
    mac_address: BC:A8:44:24:06:D7
    bindkey: !secret T35_KEY
    temperature:
      name: "T35 温度"
      state_class: measurement
      unit_of_measurement: "°C"
    humidity:
      name: "T35 湿度"
      state_class: measurement
      unit_of_measurement: "%"
    battery_level:
      name: "T35 设备电量"
      unit_of_measurement: "%"
