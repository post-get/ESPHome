esphome:
  name: esp32-t35
  friendly_name: ESP32 T35蓝牙桥接

esp32:
  board: esp32dev

# WiFi 局域网联网，依赖Workflow生成的secrets.yaml
wifi:
  ssid: !secret WIFI_SSID
  password: !secret WIFI_PASSWORD

# OTA远程升级
ota:
  password: !secret OTA_PASSWORD

# ESPHome原生API直连Home Assistant（移除加密，不需要API_KEY）
api:

# 蓝牙代理，持续扫描T35广播
bluetooth_proxy:
  active: true

# 乐易仕T35温湿度、电量解析
sensor:
  - platform: xiaomi_ble
    mac_address: BC:A8:44:24:06:D7
    bindkey: !secret T35_KEY
    temperature:
      name: "T35 温度"
      state_class: measurement
      unit_of_measurement: "°C"
    humidity:
      name: "T35 湿度"
      state_class: measurement
      unit_of_measurement: "%"
    battery_level:
      name: "T35 设备电量"
      unit_of_measurement: "%"
